details:
  en: The Employment Statistics provide important structural and economic information
    that can be used to monitor the labour market. Everyone working in Switzerland
    is covered by these statistics. Persons in employment are those who carry out
    an economic activity as defined by the national accounts for at least one hour
    per week. The ES were created in 1977. General figures go back as far as 1948.
    Other, more detailed figures as far as 1960.
  de: Die Erwerbstätigenstatistik (ETS) liefert wichtige strukturorientierte und konjunkturelle
    Daten zur Arbeitsmarktbeobachtung. Erfasst werden die im schweizerischen Wirtschaftsgebiet
    erwerbstätigen Personen. Als erwerbstätig gelten alle Personen, die im Sinne der
    Volkswirtschaftlichen Gesamtrechnung während mindestens einer Stunde pro Woche
    einer produktiven Arbeit nachgehen. Die ETS wurde 1977 geschaffen. Globaldaten
    gehen bis 1948 zurück, detailliertere Daten wurden ab 1960 zur Verfügung gestellt.
  fr: La statistique de la population active occupée (SPAO) livre des données structurelles
    et conjoncturelles précieuses pour l'observation du marché du travail. L'ensemble
    des personnes travaillant à l'intérieur du territoire économique suisse sont couvertes.
    Sont considérées comme actives occupées, les personnes qui accomplissent une activité
    productive au sens de la comptabilité nationale durant au moins une heure par
    semaine. La SPAO a été créée en 1977. Des chiffres globaux remontent jusqu'en
    1948 et d'autres, plus détaillés, jusqu'en 1960.
  it: La statistica delle persone occupate (SPO) fornisce dati strutturali e congiunturali
    preziosi per osservare il mercato del lavoro. La statistica copre tutte le persone
    attive in Svizzera, vale a dire le persone occupate che esercitano un'attività
    produttiva ai sensi della contabilità nazionale per almeno un'ora alla settimana.
    La SPO è stata creata nel 1977; alcune cifre globali risalgono al 1948 e altre,
    più dettagliate, al 1960.
