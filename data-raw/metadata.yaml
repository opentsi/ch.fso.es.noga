# OpenTSI Dataset Metadata
# ========================
# This file describes your dataset for the OpenTSI ecosystem.
# Fill in the fields below and run deloRean::validate_metadata() to check.
#
# Key pattern: country.provider.dataset.dimension.variable.unit
# Example: ch.fso.es_noga.sector.a.employees

# Dataset identity (required)
# These form the first three segments of every key
country: "ch"
provider: "fso"
dataset: "es_noga"

# Dataset title (required)
title:
  en: "Employment statistics by economic sector"
  de: "Erwerbstätigenstatistik nach Wirtschaftssektor"
  fr: "Statistique de la population active occupée par secteur économique"
  it: "Statistica delle persone occupate"

# Data source name (required)
source_name:
  en: "Federal Statistical Office FSO"
  de: "Bundesamt für Statistik BFS"
  fr: "Office fédéral de la statistique OFS"
  it: "Ufficio federale di statistica UFS"

# URL to original data source (required)
source_url: "https://www.bfs.admin.ch/bfs/de/home/statistiken/arbeit-erwerb/erhebungen/ets.html"

# Data frequency (required)
# D = daily, W = weekly, M = monthly, Q = quarterly, Y = yearly, I = irregular
dataset_frequency: "Q"

# Units of measurement
units:
  all:
    en: "Employees"
    de: "Angestellte"
    fr: "Emplois"
    it: "Addetti"

# Aggregation method for temporal aggregation
aggregate:
  all: "mean"

# Dimension order (left to right in the key, after country.provider.dataset)
dim_order:
  - "sector"
  - "sex"

# Hierarchical structure of dimensions
hierarchy:
  sector:
    tot:
      a: ~
      bf:
        bc: ~
        d: ~
        e: ~
        f: ~
      gt:
        g: ~
        h: ~
        i: ~
        j: ~
        k: ~
        l: ~
        m: ~
        "n": ~
        o: ~
        p: ~
        q: ~
        r: ~
        s: ~
        t: ~
  sex:
    ttl:
      m: ~
      f: ~

